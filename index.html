<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Up Sat Zet · Robux & ML</title>
    <link rel="icon" type="image/png" href="img.png">
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(145deg, #1a2a32 0%, #0f1a1f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 42px;
            box-shadow: 0 25px 50px -10px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 680px;
            padding: 28px 24px;
            transition: all 0.2s;
            color: #eef4f8;
        }
        h1, h2 {
            font-weight: 500;
            letter-spacing: -0.02em;
        }
        .header-logo {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .header-logo img {
            height: 60px;
            width: auto;
            border-radius: 16px;
            background: rgba(255,255,255,0.1);
            padding: 6px;
            border: 1px solid #ffb34770;
        }
        .header-logo h1 {
            font-size: 2rem;
            margin: 0;
            line-height: 1.2;
            background: linear-gradient(135deg, #ffd966, #ffb347);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        h2 {
            font-size: 1.5rem;
            margin-bottom: 24px;
            font-weight: 400;
            border-left: 5px solid #ffb347;
            padding-left: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .robux-logo {
            height: 32px;
            width: auto;
            filter: drop-shadow(0 2px 4px black);
        }
        .selector {
            display: flex;
            gap: 18px;
            flex-wrap: wrap;
            margin: 36px 0 20px;
            justify-content: center;
        }
        .selector button {
            background: rgba(20, 30, 38, 0.8);
            border: 2px solid rgba(255, 200, 100, 0.2);
            border-radius: 60px;
            padding: 20px 42px;
            font-size: 1.8rem;
            font-weight: 600;
            color: #ffdb9f;
            cursor: pointer;
            box-shadow: 0 10px 18px -6px black;
            transition: 0.2s;
            flex: 1 1 auto;
            min-width: 200px;
            backdrop-filter: blur(4px);
        }
        .selector button:hover {
            border-color: #ffb347;
            color: white;
            background: #1f313c;
            transform: scale(1.02);
        }
        .back-btn {
            background: none;
            border: 1px solid #4a5c68;
            color: #bcd3df;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 1rem;
            margin-bottom: 22px;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .back-btn:hover {
            border-color: #ffb347;
            color: white;
        }
        .package-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 28px;
            background: #1d2b33b0;
            border-radius: 36px;
            padding: 24px 20px;
            border: 1px solid #3b4e5a;
        }
        .radio-item {
            display: flex;
            align-items: center;
            gap: 14px;
            background: #16232b;
            padding: 12px 22px;
            border-radius: 60px;
            border: 1px solid #3f5562;
            transition: 0.1s;
            font-size: 1.1rem;
        }
        .radio-item:hover {
            background: #1d313d;
            border-color: #ffb85c;
        }
        input[type="radio"] {
            width: 20px;
            height: 20px;
            accent-color: #ffb347;
            transform: scale(1.1);
            margin-right: 6px;
        }
        .price-tag {
            margin-left: auto;
            background: #1f3a48;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 500;
            color: #ffd966;
            border: 1px solid #6a8fa0;
        }
        .next-btn {
            background: linear-gradient(135deg, #ff9f2f, #ff6a3a);
            border: none;
            border-radius: 60px;
            padding: 18px 32px;
            width: 100%;
            font-size: 1.4rem;
            font-weight: 600;
            color: #0f1f1f;
            cursor: pointer;
            box-shadow: 0 10px 18px -4px #ff6a3a55;
            transition: 0.15s;
            margin-top: 16px;
            border: 1px solid #ffcf9a;
        }
        .next-btn:hover {
            background: linear-gradient(135deg, #ffb347, #ff7f4f);
            transform: scale(1.01);
            box-shadow: 0 12px 22px -3px #ff964f;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
<div class="card" id="mainCard">
    <div class="header-logo">
        <img src="img.png" alt="Sat Zet logo" onerror="this.style.display='none'">
        <h1>Top Up Sat Zet</h1>
    </div>
    <div id="categorySelector" class="selector">
        <button id="chooseRobux">💰 Robux</button>
        <button id="chooseMl">💎 ML Diamond</button>
    </div>

    <div id="robuxForm" class="hidden">
        <button class="back-btn" id="backFromRobux">← Kembali</button>
        <h2>
            <img src="robux.png" alt="Robux" class="robux-logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';"> 
            <span style="display:none;">💰</span> 
            Roblox — Robux
        </h2>
        <div class="package-grid" id="robuxPackages">
        </div>
        <button class="next-btn" id="nextRobux">➡️ Lanjut ke Info</button>
    </div>

    <div id="mlForm" class="hidden">
        <button class="back-btn" id="backFromMl">← Kembali</button>
        <h2>💎 Mobile Legends — Diamond</h2>
        <div class="package-grid" id="mlPackages">
        </div>
        <button class="next-btn" id="nextMl">➡️ Lanjut ke Info</button>
    </div>
</div>

<script>
    (function() {
        const robuxPackages = [
            { label: "160 Robux", price: "Rp 37.000" },
            { label: "240 Robux", price: "Rp 50.000" },
            { label: "320 Robux", price: "Rp 65.000" },
            { label: "400 Robux + bonus 100", price: "Rp 80.000" },
            { label: "800 Robux + bonus 200", price: "Rp 160.000" },
            { label: "1.200 Robux + bonus 300", price: "Rp 250.000" },
            { label: "1.700 Robux + bonus 500", price: "Rp 320.000" },
            { label: "3.000 Robux", price: "Rp 470.000" },
            { label: "4.000 Robux", price: "Rp 630.000" }
        ];

        const mlPackages = [
            { label: "50 Diamonds", price: "Rp 16.000" },
            { label: "70 Diamonds", price: "Rp 25.000" },
            { label: "110 Diamonds", price: "Rp 35.000" },
            { label: "512 Diamonds", price: "Rp 150.000" },
            { label: "750 Diamonds", price: "Rp 220.000" }
        ];

        const categoryDiv = document.getElementById('categorySelector');
        const robuxForm = document.getElementById('robuxForm');
        const mlForm = document.getElementById('mlForm');
        const chooseRobux = document.getElementById('chooseRobux');
        const chooseMl = document.getElementById('chooseMl');
        const backRobux = document.getElementById('backFromRobux');
        const backMl = document.getElementById('backFromMl');
        const nextRobux = document.getElementById('nextRobux');
        const nextMl = document.getElementById('nextMl');

        const robuxContainer = document.getElementById('robuxPackages');
        const mlContainer = document.getElementById('mlPackages');

        function renderPackages(container, packages, nameAttr) {
            container.innerHTML = ''; 
            packages.forEach((pkg, index) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'radio-item';
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = nameAttr;
                radio.value = `${pkg.label}||${pkg.price}`;
                radio.id = `${nameAttr}_${index}`;
                if (index === 0) radio.checked = true;
                const label = document.createElement('label');
                label.htmlFor = radio.id;
                label.textContent = pkg.label;
                const span = document.createElement('span');
                span.className = 'price-tag';
                span.textContent = pkg.price;

                itemDiv.appendChild(radio);
                itemDiv.appendChild(label);
                itemDiv.appendChild(span);
                container.appendChild(itemDiv);
            });
        }

        renderPackages(robuxContainer, robuxPackages, 'robuxPackage');
        renderPackages(mlContainer, mlPackages, 'mlPackage');

        chooseRobux.addEventListener('click', () => {
            categoryDiv.classList.add('hidden');
            robuxForm.classList.remove('hidden');
            mlForm.classList.add('hidden');
        });

        chooseMl.addEventListener('click', () => {
            categoryDiv.classList.add('hidden');
            mlForm.classList.remove('hidden');
            robuxForm.classList.add('hidden');
        });

        backRobux.addEventListener('click', () => {
            robuxForm.classList.add('hidden');
            categoryDiv.classList.remove('hidden');
        });

        backMl.addEventListener('click', () => {
            mlForm.classList.add('hidden');
            categoryDiv.classList.remove('hidden');
        });

        function savePackageAndRedirect(category) {
            const radioName = category === 'Robux' ? 'robuxPackage' : 'mlPackage';
            const selected = document.querySelector(`input[name="${radioName}"]:checked`);
            if (!selected) {
                alert('Pilih paket terlebih dahulu.');
                return;
            }
            const packageValue = selected.value;
            const [label, price] = packageValue.split('||');
            const orderData = {
                category: category,
                package: label,
                price: price
            };
            localStorage.setItem('selectedPackage', JSON.stringify(orderData));
            window.location.href = 'info.html';
        }

        nextRobux.addEventListener('click', () => savePackageAndRedirect('Robux'));
        nextMl.addEventListener('click', () => savePackageAndRedirect('ML Diamond'));
    })();
</script>
</body>
</html>
